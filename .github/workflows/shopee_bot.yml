# =============================================================
# A.Z.E. — CONTENT FACTORY: SMART PIPELINE (AUTO DETECT MODE)
# GitHub Actions CI/CD | Authority: CEO
# =============================================================
#
# 🧠 SMART AUTO-DETECT:
#   CEO push data/raw_data.json → PRODUCTION mode (ข้อมูลจริง + Gemini)
#   ไม่มี raw_data.json → MOCK mode (ข้อมูลจำลอง)
#
# PIPELINE:
#   [real data] → Generator (Gemini) → QC → Edge TTS → Video 9:16
#   [mock data] → Generator (Gemini/Mock) → QC → Edge TTS → Video 9:16
#
# TRIGGERS:
#   • push data/raw_data.json → ทันที! (CEO ส่งข้อมูลจริง)
#   • schedule 08:00 ICT → ทุกวัน (mock mode)
#   • workflow_dispatch → รันด้วยมือ
# =============================================================

name: 🧟 A.Z.E. Content Factory — Smart Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'data/raw_data.json'  # CEO push ข้อมูลจริง → trigger ทันที!
  schedule:
    - cron: "0 1 * * *"      # 01:00 UTC = 08:00 ICT ทุกวัน
  workflow_dispatch:          # รันด้วยมือผ่าน GitHub UI

jobs:
  content-factory:
    name: 🏭 Content Factory — Smart Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}

    steps:
      # ─── 1. ดึงโค้ด (รวม raw_data.json ถ้า CEO push มา) ──
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Python ────────────────────────────────────────
      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ─── 3. Python dependencies ───────────────────────────
      - name: 📦 Install Python dependencies
        run: pip install -r requirements.txt

      # ─── 4. System libs (ffmpeg + Thai fonts) ─────────────
      - name: 🎬 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg libfreetype6-dev fonts-thai-tlwg
          echo "✅ ffmpeg + Thai fonts พร้อมใช้งาน"

      # ─── 5. Directory structure ───────────────────────────
      - name: 📁 Create directories
        run: mkdir -p data/images data/fonts logs

      # ─── 6. 🧠 SMART DETECT: Real Data vs Mock ────────────
      # ถ้า CEO commit raw_data.json มา → PRODUCTION
      # ถ้าไม่มี → สร้าง Mock และใช้ MOCK mode
      - name: 🔍 Detect data mode & prepare
        id: setup
        run: |
          if [ -f "data/raw_data.json" ] && python3 -c "
          import json,sys
          try:
            d=json.load(open('data/raw_data.json'))
            n=d[0].get('name','') if d else ''
            p=d[0].get('price','') if d else ''
            img=d[0].get('image_url','') if d else ''
            ok = (len(n)>5 and 'Mock' not in n and 'Fallback' not in n
                  and p.startswith('฿') and img.startswith('http'))
            sys.exit(0 if ok else 1)
          except: sys.exit(1)
          " 2>/dev/null; then
            echo "mode=production" >> $GITHUB_OUTPUT
            echo "🎯 PRODUCTION MODE — ข้อมูลจริงจาก CEO"
            echo "สินค้า: $(python3 -c \"import json; d=json.load(open('data/raw_data.json')); print(d[0].get('name','')[:60])\" 2>/dev/null)"
          else
            echo "mode=mock" >> $GITHUB_OUTPUT
            echo "⚠️  MOCK MODE — ไม่พบข้อมูลจริง สร้าง mock data"
            cat > data/raw_data.json << 'EOF'
          [{"name": "เซรั่มกันแดด SPF50+ PA++++ เนื้อน้ำบางเบา ไม่มัน กันแดดได้ทั้งวัน", "price": "฿299", "rating": 4.9, "image_url": "https://images.unsplash.com/photo-1620916566398-39f1143ab7be?q=80&w=1080&auto=format&fit=crop", "link": "https://shopee.co.th/mock-sunscreen-serum", "url": "https://shopee.co.th/mock-sunscreen-serum"}]
          EOF
          fi
          echo "✅ Data ready. Mode: $(cat $GITHUB_OUTPUT | grep mode | cut -d= -f2)"

      # ─── 7. 🧟 Run Full Pipeline ──────────────────────────
      - name: 🧟 Run A.Z.E. Content Factory Pipeline
        env:
          ENVIRONMENT: ${{ steps.setup.outputs.mode }}
        run: python main.py --once
        continue-on-error: true

      # ─── 8. Upload artifacts ──────────────────────────────
      - name: 📤 Upload content artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aze-${{ steps.setup.outputs.mode }}-run${{ github.run_number }}
          path: |
            data/generated_script.txt
            data/approved_script.txt
            data/voiceover.mp3
            data/final_video.mp4
            logs/
          retention-days: 7

      # ─── 9. สรุปผล ────────────────────────────────────────
      - name: 📊 Production Summary
        if: always()
        run: |
          echo "=== 🏭 A.Z.E. Content Factory Report ==="
          echo "Mode: ${{ steps.setup.outputs.mode }} | Run: #${{ github.run_number }}"
          echo ""
          [ -f "data/approved_script.txt" ] && echo "✅ Script: $(wc -c < data/approved_script.txt) bytes" || echo "⚠️  Script: ไม่พบ"
          [ -f "data/voiceover.mp3"      ] && echo "✅ Audio : $(du -h data/voiceover.mp3 | cut -f1)"     || echo "⚠️  Audio : ไม่พบ"
          [ -f "data/final_video.mp4"    ] && echo "✅ Video : $(du -h data/final_video.mp4 | cut -f1)"    || echo "⚠️  Video : ไม่พบ"
          echo "======================================="
